<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cute Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <h1 class="logo"> Affan</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-content">
    <h2>Hello 👋</h2>
    <h1>I’m <span>Affan</span></h1>
    <p>Creative Frontend Developer</p>
    <button>✨ Hire Me</button>
  </div>
</section>

<!-- PROJECTS -->
<section class="projects" id="projects">
  <h2>My Projects 💻</h2>

  <div class="grid">

    <div class="card">
      <h3>Car Rental 🚗</h3>
      <p>Booking system UI</p>
    </div>

    <div class="card">
      <h3>SMS System 📩</h3>
      <p>Student management</p>
    </div>

    <div class="card">
      <h3>Carpool 🚘</h3>
      <p>Ride sharing system</p>
    </div>

    <div class="card">
      <h3>Portfolio 🌐</h3>
      <p>Personal website</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
  <h2>Contact Me 💌</h2>

  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message"></textarea>
    <button type="submit">Send ✉️</button>
  </form>
</section>

<!-- FOOTER -->
<footer>
  <p>Made with ❤️ by Affan</p>
</footer>

</body>
</html>
